<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Canteen POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #f59e0b20;
      border: 1px solid #f59e0b40;
      color: #f59e0b;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    button:hover { background: #2563eb; }
    .note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <div class="badge">
      <div class="dot"></div>
      Offline Mode Active
    </div>
    <h1>No Internet Connection</h1>
    <p>
      The Canteen POS is in offline mode. Your orders are being saved locally
      and will sync automatically when the connection is restored.
    </p>
    <button onclick="window.location.reload()">Try Reconnecting</button>
    <p class="note">All data entered while offline is safe and will not be lost.</p>
  </div>
</body>
</html>
